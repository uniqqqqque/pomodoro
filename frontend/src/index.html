<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../dist/output.css" />
    <title>Pomodoro</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍅</text></svg>"
    />
  </head>
  <body class="flex min-h-screen flex-col bg-slate-900">
    <div class="mx-auto my-auto flex w-3xl max-w-3xl flex-col gap-4">
      <div
        class="flex items-center justify-between rounded-2xl bg-slate-800 p-8"
      >
        <a href="stats.html">
          <button
            id="statsBtn"
            class="mx-4 w-50 cursor-pointer rounded-lg bg-orange-400 p-3 text-xl font-semibold text-white transition hover:bg-orange-500"
          >
            Stats
          </button>
        </a>
        <h1 class="mx-4 mb-6 text-center text-2xl font-bold text-white">
          🍅⏰
        </h1>
        <button
          id="logoutBtn"
          class="mx-4 w-50 cursor-pointer rounded-lg bg-red-400 p-3 text-xl font-semibold text-white transition hover:bg-red-500"
        >
          Logout
        </button>
      </div>
      <div
        class="flex flex-col items-center justify-center gap-6 rounded-2xl bg-slate-800 p-8"
      >
        <span id="mode" class="text-xl font-semibold text-slate-400"
          >Working</span
        >
        <div class="relative flex h-100 w-100 items-center justify-center">
          <svg width="300" height="300" viewBox="0 0 300 300" class="absolute">
            <circle
              cx="150"
              cy="150"
              r="140"
              fill="none"
              stroke="#1e293b"
              stroke-width="10"
            />
            <circle
              id="progressRing"
              cx="150"
              cy="150"
              r="140"
              fill="none"
              stroke="#f97316"
              stroke-width="10"
              stroke-dasharray="879.6"
              stroke-dashoffset="0"
              stroke-linecap="round"
              transform="rotate(-90 150 150)"
            />
          </svg>
          <span id="timer" class="text-6xl font-bold text-white">25:00</span>
        </div>
        <div class="mt-10 flex gap-4">
          <button
            id="startBtn"
            class="mx-4 w-50 cursor-pointer rounded-lg bg-green-400 p-3 text-xl font-semibold text-white transition hover:bg-green-500"
          >
            Start
          </button>
          <button
            id="pauseBtn"
            class="mx-4 w-50 cursor-pointer rounded-lg bg-gray-400 p-3 text-xl font-semibold text-white transition hover:bg-gray-500"
          >
            Pause
          </button>
          <button
            id="resetBtn"
            class="mx-4 w-50 cursor-pointer rounded-lg bg-blue-400 p-3 text-xl font-semibold text-white transition hover:bg-blue-500"
          >
            Reset
          </button>
        </div>
      </div>
    </div>
    <script src="./js/api.js"></script>
    <script src="./js/timer.js"></script>
  </body>
</html>
