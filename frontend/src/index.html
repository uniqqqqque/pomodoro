<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../dist/output.css" />
    <title>Pomodoro</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍅</text></svg>"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body
    class="flex min-h-screen flex-col items-center justify-center bg-gray-950"
  >
    <div class="flex w-full max-w-xl flex-col gap-5 px-4">
      <!-- Header -->
      <div class="flex items-center justify-between px-1">
        <span
          class="text-base font-bold tracking-widest text-orange-400 uppercase"
          >🍅 Pomodoro</span
        >
        <div class="flex gap-2">
          <a href="stats.html">
            <button
              id="statsBtn"
              class="h-9 w-9 cursor-pointer rounded-xl bg-slate-800 text-slate-400 transition hover:bg-slate-700 hover:text-white"
            >
              <i class="fa-solid fa-chart-line text-sm"></i>
            </button>
          </a>
          <button
            id="logoutBtn"
            class="h-9 w-9 cursor-pointer rounded-xl bg-slate-800 text-slate-400 transition hover:bg-slate-700 hover:text-white"
          >
            <i class="fa-solid fa-right-from-bracket text-sm"></i>
          </button>
        </div>
      </div>

      <!-- Main card -->
      <div
        class="flex flex-col items-center gap-7 rounded-3xl bg-gray-900 p-8 shadow-2xl ring-1 ring-white/5"
      >
        <!-- Mode label -->
        <div class="flex items-center gap-2">
          <i
            id="modeIcon"
            class="fa-solid fa-brain text-base text-slate-500"
          ></i>
          <span
            id="modeLabel"
            class="text-sm font-semibold tracking-widest text-slate-500 uppercase"
            >Focus</span
          >
        </div>

        <!-- Timer ring -->
        <div class="relative flex h-75 w-75 items-center justify-center">
          <svg width="300" height="300" viewBox="0 0 300 300" class="absolute">
            <circle
              cx="150"
              cy="150"
              r="140"
              fill="none"
              stroke="#1e293b"
              stroke-width="10"
            />
            <circle
              id="progressRing"
              cx="150"
              cy="150"
              r="140"
              fill="none"
              stroke="#f97316"
              stroke-width="12"
              stroke-dasharray="879.6"
              stroke-dashoffset="0"
              stroke-linecap="round"
              transform="rotate(-90 150 150)"
            />
          </svg>
          <span id="timer" class="text-7xl font-bold tracking-tight text-white"
            >25:00</span
          >
        </div>

        <!-- Pomodoro cycle dots -->
        <div class="flex gap-2">
          <div class="h-1.5 w-7 rounded-full bg-slate-700" id="dot0"></div>
          <div class="h-1.5 w-7 rounded-full bg-slate-700" id="dot1"></div>
          <div class="h-1.5 w-7 rounded-full bg-slate-700" id="dot2"></div>
          <div class="h-1.5 w-7 rounded-full bg-slate-700" id="dot3"></div>
        </div>

        <!-- Controls -->
        <div class="mt-4 flex items-center gap-3">
          <button
            id="resetBtn"
            class="h-12 w-12 cursor-pointer rounded-2xl bg-slate-800 text-slate-400 transition hover:bg-slate-700 hover:text-white active:scale-95"
          >
            <i class="fa-solid fa-rotate-left"></i>
          </button>
          <button
            id="startBtn"
            class="h-14 w-36 cursor-pointer rounded-2xl bg-orange-500 text-xl font-bold text-white shadow-lg shadow-orange-500/25 transition hover:bg-orange-400 active:scale-95"
          >
            <i class="fa-solid fa-play"></i>
          </button>
          <button
            id="pauseBtn"
            class="h-12 w-12 cursor-pointer rounded-2xl bg-slate-800 text-slate-400 transition hover:bg-slate-700 hover:text-white active:scale-95"
          >
            <i class="fa-solid fa-pause"></i>
          </button>
        </div>
      </div>
    </div>
    <script src="./js/api.js"></script>
    <script src="./js/timer.js"></script>
  </body>
</html>
