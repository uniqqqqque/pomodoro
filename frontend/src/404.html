<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../dist/output.css" />
    <title>404 - Pomodoro</title>
    <link rel="icon" type="image/png" sizes="128x128" href="icons/pomodoro-technique-128.png" />
    <link rel="apple-touch-icon" href="icons/pomodoro-technique-512.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script>
      if (localStorage.theme === "light")
        document.documentElement.classList.add("light");
    </script>
  </head>
  <body class="flex min-h-screen items-center justify-center bg-gray-950">
    <div class="w-full max-w-sm px-4">
      <div class="animate mb-8 text-center">
        <span
          class="text-base font-bold tracking-widest text-orange-400 uppercase"
          >uniqque/pomodoro</span
        >
      </div>
      <div
        class="animate flex flex-col items-center gap-6 rounded-3xl bg-gray-900 p-8 shadow-2xl ring-1 ring-white/5"
      >
        <i class="fa-solid fa-circle-exclamation text-5xl text-slate-600"></i>
        <div class="text-center">
          <p class="text-6xl font-bold text-white">404</p>
          <p class="mt-2 text-sm tracking-widest text-slate-500 uppercase">
            Page not found
          </p>
        </div>
        <a href="/login.html" class="w-full">
          <button
            id="returnToLoginBtn"
            class="w-full cursor-pointer rounded-2xl bg-orange-500 py-3 font-bold text-white shadow-lg shadow-orange-500/25 transition hover:bg-orange-400 active:scale-95"
          >
            <i class="fa-solid fa-arrow-left mr-2"></i>Back to login
          </button>
        </a>
      </div>
    </div>
    <script>
      document.querySelectorAll(".animate").forEach((el, i) => {
        el.style.animationDelay = `${i * 80}ms`;
        el.classList.add("stagger-in");
      });
    </script>
  </body>
</html>
