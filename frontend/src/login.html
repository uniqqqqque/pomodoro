<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../dist/output.css" />
    <title>Login - Pomodoro</title>
    <link rel="icon" type="image/png" sizes="128x128" href="icons/pomodoro-technique-128.png" />
    <link rel="apple-touch-icon" href="icons/pomodoro-technique-512.png" />
    <link rel="manifest" href="manifest.json" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script>
      if (localStorage.theme === "light")
        document.documentElement.classList.add("light");
    </script>
  </head>
  <body class="flex min-h-screen items-center justify-center bg-gray-950">
    <div class="w-full max-w-sm px-4">
      <div class="animate mb-8 text-center">
        <span
          class="text-base font-bold tracking-widest text-orange-400 uppercase"
          >uniqque/pomodoro</span
        >
      </div>
      <div
        class="flex flex-col gap-4 rounded-3xl bg-gray-900 p-8 shadow-2xl ring-1 ring-white/5"
      >
        <input
          type="text"
          id="username"
          placeholder="Username"
          class="animate w-full rounded-2xl bg-slate-800 px-4 py-3 text-white placeholder-slate-500 ring-1 ring-white/5 transition outline-none focus:ring-orange-500/50"
        />
        <div class="animate relative">
          <input
            type="password"
            id="password"
            placeholder="Password"
            class="w-full rounded-2xl bg-slate-800 px-4 py-3 pr-11 text-white placeholder-slate-500 ring-1 ring-white/5 transition outline-none focus:ring-orange-500/50"
          />
          <button
            type="button"
            id="togglePassword"
            class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-slate-500 transition hover:text-slate-300"
          >
            <i class="fa-regular fa-eye text-sm"></i>
          </button>
        </div>
        <div
          id="confirmPasswordWrapper"
          class="relative pointer-events-none opacity-0 transition-all duration-300"
        >
          <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm password"
            class="w-full rounded-2xl bg-slate-800 px-4 py-3 pr-11 text-white placeholder-slate-500 ring-1 ring-white/5 outline-none focus:ring-orange-500/50"
          />
          <button
            type="button"
            id="toggleConfirmPassword"
            class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-slate-500 transition hover:text-slate-300"
          >
            <i class="fa-regular fa-eye text-sm"></i>
          </button>
        </div>
        <p id="errorMsg" class="hidden text-center text-sm text-red-400"></p>
        <button
          id="loginBtn"
          class="animate w-full cursor-pointer rounded-2xl bg-orange-500 py-3 font-bold text-white shadow-lg shadow-orange-500/25 transition hover:bg-orange-400 active:scale-95"
        >
          <i class="fa-solid fa-right-to-bracket mr-2"></i>Login
        </button>
        <button
          id="registerBtn"
          class="animate w-full cursor-pointer rounded-2xl bg-slate-800 py-3 font-bold text-slate-400 ring-1 ring-white/5 transition hover:bg-slate-700 hover:text-white active:scale-95"
        >
          <i class="fa-solid fa-user-plus mr-2"></i>Register
        </button>
      </div>
    </div>
    <script src="./js/api.js"></script>
    <script src="./js/login.js"></script>
  </body>
</html>
