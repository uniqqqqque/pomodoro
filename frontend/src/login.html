<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../dist/output.css" />
    <title>Login - Pomodoro</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍅</text></svg>"
    />
  </head>
  <body class="flex min-h-screen items-center justify-center bg-slate-900">
    <header class="m-4 p-4"></header>
    <section>
      <div class="w-96 rounded-2xl bg-slate-800 p-8">
        <h1 class="mb-6 text-center text-2xl font-bold text-white">
          Pomodoro timer 🍅⏰
        </h1>
        <input
          type="text"
          id="username"
          placeholder="Username"
          class="my-2 w-full rounded-lg bg-slate-700 p-4 text-white placeholder-slate-400 outline-none"
        />
        <input
          type="password"
          id="password"
          placeholder="Password"
          class="my-2 w-full rounded-lg bg-slate-700 p-4 text-white placeholder-slate-400 outline-none"
        />
        <input
          type="email"
          id="email"
          placeholder="email@example.com"
          class="pointer-events-none my-2 w-full overflow-hidden rounded-lg bg-slate-700 p-4 text-white placeholder-slate-400 opacity-0 transition-all duration-300 outline-none"
        />
        <button
          id="loginBtn"
          class="my-2 w-full cursor-pointer rounded-lg bg-green-400 p-4 font-semibold text-white transition hover:bg-green-500"
        >
          Login
        </button>
        <button
          id="registerBtn"
          class="my-2 w-full cursor-pointer rounded-lg bg-orange-400 p-4 font-semibold text-white transition hover:bg-orange-500"
        >
          Register
        </button>
      </div>
    </section>
    <footer class="m-4 p-4"></footer>
    <script src="./js/api.js"></script>
    <script src="./js/login.js"></script>
  </body>
</html>
