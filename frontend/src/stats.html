<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../dist/output.css" />
    <title>Stats - Pomodoro</title>
    <link rel="icon" type="image/png" sizes="128x128" href="icons/pomodoro-technique-128.png" />
    <link rel="apple-touch-icon" href="icons/pomodoro-technique-512.png" />
    <link rel="manifest" href="manifest.json" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script>
      if (localStorage.theme === "light")
        document.documentElement.classList.add("light");
    </script>
  </head>
  <body
    class="flex min-h-screen flex-col items-center justify-center bg-gray-950 py-10"
  >
    <div class="flex w-full max-w-4xl flex-col gap-5 px-4">
      <!-- Header -->
      <div class="animate flex items-center justify-between px-1">
        <div class="flex flex-col gap-0.5">
          <span
            class="text-base font-bold tracking-widest text-orange-400 uppercase"
            id="usernameLabel"
            >uniqque/pomodoro</span
          >
          <span id="rankBadge" class="text-sm font-semibold tracking-wide text-slate-500">—</span>
        </div>
        <div class="flex gap-2">
          <a href="leaderboard.html">
            <button
              class="h-9 w-9 cursor-pointer rounded-xl bg-slate-800 text-slate-400 transition hover:bg-slate-700 hover:text-white"
            >
              <i class="fa-solid fa-trophy text-sm"></i>
            </button>
          </a>
          <a href="index.html">
            <button
              class="h-9 w-9 cursor-pointer rounded-xl bg-slate-800 text-slate-400 transition hover:bg-slate-700 hover:text-white"
            >
              <i class="fa-solid fa-clock text-sm"></i>
            </button>
          </a>
          <button
            id="logoutBtn"
            class="h-9 w-9 cursor-pointer rounded-xl bg-slate-800 text-slate-400 transition hover:bg-slate-700 hover:text-white"
          >
            <i class="fa-solid fa-right-from-bracket text-sm"></i>
          </button>
        </div>
      </div>

      <!-- Stats cards -->
      <div class="grid grid-cols-3 gap-3">
        <div
          class="animate flex flex-col items-center gap-2 rounded-2xl bg-gray-900 py-6 ring-1 ring-white/5"
        >
          <i class="fa-solid fa-clock text-lg text-slate-600"></i>
          <span
            class="text-sm font-semibold text-slate-500"
            >Total</span
          >
          <span id="total" class="text-4xl font-bold text-white">--:--</span>
        </div>
        <div
          class="animate flex flex-col items-center gap-2 rounded-2xl bg-gray-900 py-6 ring-1 ring-white/5"
        >
          <i class="fa-solid fa-calendar-day text-lg text-slate-600"></i>
          <span
            class="text-sm font-semibold text-slate-500"
            >Today</span
          >
          <span id="today" class="text-4xl font-bold text-white">--:--</span>
        </div>
        <div
          class="animate flex flex-col items-center gap-2 rounded-2xl bg-gray-900 py-6 ring-1 ring-white/5"
        >
          <i class="fa-solid fa-calendar text-lg text-slate-600"></i>
          <span
            class="text-sm font-semibold text-slate-500"
            >Month</span
          >
          <span id="month" class="text-4xl font-bold text-white">--:--</span>
        </div>
      </div>

      <!-- Extra stats -->
      <div class="grid grid-cols-2 gap-3">
        <div
          class="animate flex flex-col items-center gap-2 rounded-2xl bg-gray-900 py-6 ring-1 ring-white/5"
        >
          <i class="fa-solid fa-fire text-lg text-slate-600"></i>
          <span
            class="text-sm font-semibold text-slate-500"
            >Streak</span
          >
          <span id="streak" class="text-4xl font-bold text-white">--</span>
          <span class="text-xs text-slate-600">days</span>
        </div>
        <div
          class="animate flex flex-col items-center gap-2 rounded-2xl bg-gray-900 py-6 ring-1 ring-white/5"
        >
          <i class="fa-solid fa-chart-line text-lg text-slate-600"></i>
          <span
            class="text-sm font-semibold text-slate-500"
            >Avg / day</span
          >
          <span id="avgday" class="text-4xl font-bold text-white">--:--</span>
          <span class="text-xs text-slate-600">all time</span>
        </div>
      </div>

      <!-- Activity chart -->
      <div
        class="animate flex flex-col gap-4 rounded-3xl bg-gray-900 p-6 shadow-2xl ring-1 ring-white/5"
      >
        <span
          class="text-sm font-semibold text-slate-400"
          >Activity by hour</span
        >
        <canvas id="activity"></canvas>
      </div>

      <!-- Heatmap -->
      <div
        class="animate flex flex-col gap-4 overflow-x-auto rounded-3xl bg-gray-900 p-6 shadow-2xl ring-1 ring-white/5"
      >
        <span
          class="text-sm font-semibold text-slate-400"
          >Heatmap</span
        >
        <div id="heatmap"></div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="./js/api.js"></script>
    <script src="./js/stats.js"></script>
  </body>
</html>
